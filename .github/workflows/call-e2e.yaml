name: Call e2e test

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string

jobs:
  e2e:
    runs-on: [daocloud-runner]
    steps:

      - name: hello
        run: |
          echo "hello world"

      - name: checkout code
        uses: actions/checkout@v4

      - name: install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: setup e2e env
        env:
          GOVC_URL: ${{ vars.VSPHERE_SERVER }}
          GOVC_USERNAME: ${{ vars.VSPHERE_USER }}
          GOVC_PASSWORD: ${{ vars.VSPHERE_PASSWD }}
          GOVC_DATACENTER: ${{ vars.VSPHERE_DATACENTER }}
          VSPHERE_GPU_VM_IP: ${{ vars.VSPHERE_GPU_VM_IP }}
          VSPHERE_GPU_VM_NAME: ${{ vars.VSPHERE_GPU_VM_NAME }}
          VSPHERE_GPU_VM_NAME_SNAPSHOT: ${{ vars.VSPHERE_GPU_VM_NAME_SNAPSHOT }}
        run: |
          make e2e-env-setup

      - name: hami helm deploy
        env:
          KUBE_CONF: ${{ vars.GPU_KUBE_CONF_PATH}}
        run: |
          echo "make helm-deploy"
          make helm-deploy

      - name: e2e test
        env:
          KUBE_CONF: ${{ vars.GPU_KUBE_CONF_PATH}}
        run: |
          echo "make e2e-test"
          sleep 1234567
